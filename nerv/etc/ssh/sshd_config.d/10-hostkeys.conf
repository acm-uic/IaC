HostKey /var/etc/ssh/ssh_host_rsa_key
HostKey /var/etc/ssh/ssh_host_ecdsa_key
HostKey /var/etc/ssh/ssh_host_ed25519_key

Ciphers +aes128-cbc,aes192-cbc,aes256-cbc,aes128-ctr,aes192-ctr,aes256-ctr,aes128-gcm@openssh.com,aes256-gcm@openssh.com,chacha20-poly1305@openssh.com

# AuthenticationMethods keyboard-interactive,password,publickey,gssapi-with-mic

# KbdInteractiveAuthentication yes
# PubkeyAuthentication yes