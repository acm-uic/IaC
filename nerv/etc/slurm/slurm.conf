# slurm.conf file generated by configurator easy.html.
# Put this file on all nodes of your cluster.
# See the slurm.conf man page for more information.
#
ClusterName=nerv
SlurmctldHost=misato(misato.acmuic.org)
#
#MailProg=/bin/mail
#MpiDefault=mpi/pmi2
#MpiParams=ports=#-#
ProctrackType=proctrack/cgroup
ReturnToService=1
SlurmctldPidFile=/var/run/slurmctld.pid
#SlurmctldPort=6817
SlurmdPidFile=/var/run/slurmd.pid
#SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurmd
SlurmUser=slurm
#SlurmdUser=root
StateSaveLocation=/var/spool/slurmctld
#SwitchType=
TaskPlugin=task/cgroup,task/affinity

#
# TIMERS
#KillWait=30
#MinJobAge=300
#SlurmctldTimeout=120
#SlurmdTimeout=300
#
#
# SCHEDULING
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU_Memory,CR_LLN
#
#
# LOGGING AND ACCOUNTING
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=misato
#JobAcctGatherFrequency=30
JobAcctGatherType=jobacct_gather/cgroup
#SlurmctldDebug=info
#SlurmctldLogFile=/var/log/slurmctld.log
SlurmdDebug=verbose
#SlurmdLogFile=/var/log/slurmd.log
JobCompType=jobcomp/filetxt
JobCompLoc=/var/spool/slurmctld/jobs.txt
#NameSpaceType=namespace/linux
LaunchParameters=use_interactive_step
# --login is GNU not Posix but then again nothing useful is POSIX...
InteractiveStepOptions="--interactive --preserve-env --pty $SHELL --login"

#
#
#---- End Autogen'd config ---------#
# Actually the autogen was ass so its all handwritten now...

# Setup GPU tracking
GresTypes=gpu
AccountingStorageTRES=gres/gpu

DefMemPerCPU=1000

# Specify nodes
# Specifying nodes individually so that NodeAddr can be set
NodeName=rei RealMemory=61980 Sockets=1 CoresPerSocket=16 ThreadsPerCore=2 Gres=gpu:1 Features=nvidia State=UNKNOWN
NodeName=shinji RealMemory=61980 Sockets=1 CoresPerSocket=16 ThreadsPerCore=2 Gres=gpu:1 Features=nvidia State=UNKNOWN
NodeName=asuka RealMemory=61980 Sockets=1 CoresPerSocket=16 ThreadsPerCore=2 Gres=gpu:1 Features=nvidia State=UNKNOWN
NodeName=misato RealMemory=61980 Sockets=1 CoresPerSocket=16 ThreadsPerCore=2 State=UNKNOWN
PartitionName=main Nodes=ALL Default=YES MaxTime=INFINITE State=UP