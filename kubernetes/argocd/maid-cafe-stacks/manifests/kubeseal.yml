---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeseal
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  sources:
    - path: kubernetes/argocd/maid-cafe-stacks/helm_charts/kubeseal
      repoURL: 'git@github.com:acm-uic/IaC.git'
      targetRevision: HEAD
      ref: values
      directory:
        recurse: true
        include: '*.yml'
        exclude: values.yml
  project: system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
